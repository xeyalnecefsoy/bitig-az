
[functions.moderate-content]
enabled = true
verify_jwt = true
import_map = "./functions/moderate-content/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/moderate-content/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/moderate-content/*.html" ]

[functions.cleanup-rejected]
enabled = true
verify_jwt = true
entrypoint = "./functions/cleanup-rejected/index.ts"
